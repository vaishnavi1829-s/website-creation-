<svg xmlns="http://www.w3.org/2000/svg" width="420" height="630" viewBox="0 0 420 630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0614"/>
      <stop offset="50%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#2d0a5c"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#999"/>
      <stop offset="50%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#999"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="30%" stop-color="#ffd700"/>
      <stop offset="70%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e63946"/>
      <stop offset="100%" stop-color="#150c0d"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="titleShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.8"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="1" fill="rgba(255,255,255,0.06)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="420" height="630" fill="url(#bgGrad)"/>
  <rect width="420" height="630" fill="url(#dots)"/>

  <!-- Decorative circles -->
  <circle cx="380" cy="80" r="120" fill="#e63946" opacity="0.04"/>
  <circle cx="40" cy="520" r="140" fill="#e63946" opacity="0.04"/>
  <circle cx="210" cy="315" r="200" fill="none" stroke="#e63946" stroke-width="0.5" opacity="0.1"/>

  <!-- Film strip top -->
  <rect x="0" y="0" width="420" height="14" fill="rgba(0,0,0,0.5)"/>
  <circle cx="14" cy="7" r="4" fill="#2d0a5c" stroke="#e63946" stroke-width="1" opacity="0.5"/>
  <circle cx="34" cy="7" r="4" fill="#2d0a5c" stroke="#e63946" stroke-width="1" opacity="0.5"/>
  <circle cx="54" cy="7" r="4" fill="#2d0a5c" stroke="#e63946" stroke-width="1" opacity="0.5"/>
  <circle cx="74" cy="7" r="4" fill="#2d0a5c" stroke="#e63946" stroke-width="1" opacity="0.5"/>
  <circle cx="94" cy="7" r="4" fill="#2d0a5c" stroke="#e63946" stroke-width="1" opacity="0.5"/>
  <circle cx="326" cy="7" r="4" fill="#2d0a5c" stroke="#e63946" stroke-width="1" opacity="0.5"/>
  <circle cx="346" cy="7" r="4" fill="#2d0a5c" stroke="#e63946" stroke-width="1" opacity="0.5"/>
  <circle cx="366" cy="7" r="4" fill="#2d0a5c" stroke="#e63946" stroke-width="1" opacity="0.5"/>
  <circle cx="386" cy="7" r="4" fill="#2d0a5c" stroke="#e63946" stroke-width="1" opacity="0.5"/>
  <circle cx="406" cy="7" r="4" fill="#2d0a5c" stroke="#e63946" stroke-width="1" opacity="0.5"/>

  <!-- Film strip bottom -->
  <rect x="0" y="616" width="420" height="14" fill="rgba(0,0,0,0.5)"/>
  <circle cx="14" cy="623" r="4" fill="#2d0a5c" stroke="#e63946" stroke-width="1" opacity="0.5"/>
  <circle cx="34" cy="623" r="4" fill="#2d0a5c" stroke="#e63946" stroke-width="1" opacity="0.5"/>
  <circle cx="54" cy="623" r="4" fill="#2d0a5c" stroke="#e63946" stroke-width="1" opacity="0.5"/>
  <circle cx="74" cy="623" r="4" fill="#2d0a5c" stroke="#e63946" stroke-width="1" opacity="0.5"/>
  <circle cx="94" cy="623" r="4" fill="#2d0a5c" stroke="#e63946" stroke-width="1" opacity="0.5"/>
  <circle cx="326" cy="623" r="4" fill="#2d0a5c" stroke="#e63946" stroke-width="1" opacity="0.5"/>
  <circle cx="346" cy="623" r="4" fill="#2d0a5c" stroke="#e63946" stroke-width="1" opacity="0.5"/>
  <circle cx="366" cy="623" r="4" fill="#2d0a5c" stroke="#e63946" stroke-width="1" opacity="0.5"/>
  <circle cx="386" cy="623" r="4" fill="#2d0a5c" stroke="#e63946" stroke-width="1" opacity="0.5"/>
  <circle cx="406" cy="623" r="4" fill="#2d0a5c" stroke="#e63946" stroke-width="1" opacity="0.5"/>

  <!-- Hero icon -->
  <text x="210" y="165" text-anchor="middle" font-size="64" filter="url(#glow)" opacity="0.9">💥</text>

  <!-- Mood badge -->
  <rect x="150" y="175" width="120" height="22" rx="11" fill="#e63946" opacity="0.7"/>
  <text x="210" y="190" text-anchor="middle" fill="#fff" font-size="10" font-weight="700" font-family="sans-serif" letter-spacing="3">EXPLOSIVE</text>

  <!-- Title -->
  <text x="210" y="210" text-anchor="middle" fill="#fff" font-size="28" font-weight="900" font-family="Georgia, serif" letter-spacing="2" filter="url(#titleShadow)">Leo</text>


    <!-- IMDb Rating -->
  <rect x="160" y="244" width="100" height="32" rx="16" fill="#e63946" filter="url(#glow)"/>
  <text x="210" y="266" text-anchor="middle" fill="#fff" font-size="18" font-weight="800" font-family="sans-serif">★ 7.4/10</text>


  <!-- Meta badges row -->
  <rect x="30" y="425" width="110" height="34" rx="17" fill="#e63946" opacity="0.15" stroke="#e63946" stroke-width="1" stroke-opacity="0.3"/>
  <text x="85" y="446" text-anchor="middle" fill="#ff6b6b" font-size="13" font-weight="700" font-family="sans-serif" letter-spacing="1">Tamil</text>

  <rect x="155" y="425" width="110" height="34" rx="17" fill="#e63946" opacity="0.15" stroke="#e63946" stroke-width="1" stroke-opacity="0.3"/>
  <text x="210" y="446" text-anchor="middle" fill="#ff6b6b" font-size="13" font-weight="700" font-family="sans-serif" letter-spacing="1">Action</text>

  <rect x="280" y="425" width="110" height="34" rx="17" fill="#e63946" opacity="0.15" stroke="#e63946" stroke-width="1" stroke-opacity="0.3"/>
  <text x="335" y="446" text-anchor="middle" fill="#ff6b6b" font-size="13" font-weight="700" font-family="sans-serif" letter-spacing="1">⭐ 7.4</text>

  <!-- Duration & Year -->
  <text x="210" y="488" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14" font-family="sans-serif" letter-spacing="1">2h 43m  •  2023</text>

  <!-- CTA Button -->
  <rect x="100" y="520" width="220" height="48" rx="24" fill="url(#accentGrad)" filter="url(#softGlow)"/>
  <text x="210" y="550" text-anchor="middle" fill="#fff" font-size="17" font-weight="800" font-family="sans-serif" letter-spacing="2">BOOK NOW ▸</text>

  <!-- Decorative line -->
  <line x1="140" y1="572" x2="280" y2="572" stroke="#e63946" stroke-width="1" opacity="0.3"/>

  <!-- Footer -->
  <text x="210" y="600" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-size="11" font-family="sans-serif" letter-spacing="1">CINEBOOK • IN THEATRES NOW</text>
</svg>